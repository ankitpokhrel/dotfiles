# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """
$username\
${custom.userhost}\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[username]
disabled = true

[hostname]
disabled = true

[custom.userhost]
command = 'echo -n "$USER@$(hostname -s)"'
format = '[$output]($style) '
style = 'red'
when = '[[ -n "$SSH_CONNECTION" ]]'

[directory]
style = "bright-blue"

[character]
success_symbol = "[‚ěĒ](bright-blue)"
error_symbol = "[‚ěĒ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "cyan"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](250) ($ahead_behind$stashed)]($style) "
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
